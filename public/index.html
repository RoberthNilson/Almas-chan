<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alma-chan 🌸</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #16213e;
      --bg3: #13132a;
      --bg4: #0f0f23;
      --border: #0f3460;
      --accent: #e94560;
      --accent2: #ff6b9d;
      --text: #eee;
      --text2: #aaa;
      --text3: #888;
    }

    .light {
      --bg: #f0f2f5;
      --bg2: #fff;
      --bg3: #e8eaed;
      --bg4: #ddd;
      --border: #ccc;
      --accent: #e94560;
      --accent2: #ff6b9d;
      --text: #222;
      --text2: #555;
      --text3: #888;
    }

    .combat {
      --bg: #0a0000;
      --bg2: #1a0000;
      --bg3: #120000;
      --bg4: #080000;
      --border: #ff0000;
      --accent: #ff0000;
      --accent2: #ff3333;
      --text: #ffcccc;
      --text2: #ff6666;
      --text3: #cc0000;
      animation: glitch-bg 0.5s infinite;
    }

    @keyframes glitch-bg {

      0%,
      100% {
        filter: none;
      }

      25% {
        filter: hue-rotate(5deg);
      }

      50% {
        filter: hue-rotate(-5deg) brightness(1.05);
      }

      75% {
        filter: hue-rotate(10deg);
      }
    }

    .combat .msg.alma {
      border-color: #ff0000 !important;
      text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
    }

    .combat header {
      border-bottom-color: #ff0000 !important;
    }

    .combat #shortcuts button:hover {
      border-color: #ff0000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    header {
      background: var(--bg2);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }

    .header-left h1 {
      font-size: 1.1rem;
      color: var(--accent2);
    }

    .header-left span {
      font-size: 0.65rem;
      color: var(--text2);
    }

    .header-right {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .hdr-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .hdr-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hdr-btn.mic-active {
      border-color: #00cc66;
      color: #00cc66;
    }

    .hdr-btn.mic-listening {
      border-color: #ff3333;
      color: #ff3333;
      animation: pulse 0.4s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(233, 69, 96, 0);
      }
    }

    #status-bar {
      display: flex;
      gap: 10px;
      padding: 4px 12px;
      background: var(--bg4);
      font-size: 0.62rem;
      color: var(--text3);
      flex-shrink: 0;
      overflow-x: auto;
      white-space: nowrap;
    }

    #status-bar span {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-g {
      background: #00cc66;
    }

    .dot-y {
      background: #ffaa00;
    }

    .dot-r {
      background: #ff3333;
    }

    #shortcuts {
      display: flex;
      gap: 4px;
      padding: 5px 8px;
      overflow-x: auto;
      background: var(--bg3);
      flex-shrink: 0;
    }

    #shortcuts button {
      flex-shrink: 0;
      padding: 4px 9px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text2);
      font-size: 0.68rem;
      cursor: pointer;
    }

    #shortcuts button:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 14px;
      line-height: 1.35;
      font-size: 0.85rem;
      animation: fadeIn 0.15s;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
      }
    }

    .user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .alma {
      align-self: flex-start;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .alma.action {
      border-color: var(--accent2);
    }

    .alma img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 4px;
      cursor: pointer;
    }

    .action-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 6px;
      margin-bottom: 3px;
    }

    .typing {
      align-self: flex-start;
      color: var(--text3);
      font-style: italic;
      font-size: 0.75rem;
    }

    #input-bar {
      display: flex;
      gap: 6px;
      padding: 8px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-bar input {
      flex: 1;
      padding: 9px 13px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
    }

    #input-bar input:focus {
      border-color: var(--accent);
    }

    #input-bar button {
      padding: 9px 14px;
      border-radius: 18px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }

    #input-bar button:hover {
      opacity: 0.85;
    }

    .preview-bar {
      display: none;
      padding: 4px 10px;
      background: var(--bg3);
      font-size: 0.7rem;
      color: var(--text2);
      align-items: center;
      gap: 6px;
    }

    .preview-bar.show {
      display: flex;
    }

    .preview-bar img {
      height: 30px;
      border-radius: 4px;
    }

    .preview-bar button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
    }

    #menu-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #menu-modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      width: 90%;
      max-width: 320px;
    }

    .modal-content h3 {
      color: var(--accent2);
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .modal-content button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      text-align: left;
    }

    .modal-content button:hover {
      border-color: var(--accent);
    }

    .modal-close {
      background: var(--accent) !important;
      color: #fff !important;
      text-align: center !important;
      margin-top: 10px !important;
    }

    @media (min-width: 600px) {
      #chat {
        padding: 16px 28%;
      }

      .msg {
        max-width: 60%;
      }
    }

    #waModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #waModal .wa-box {
      background: var(--bg2);
      padding: 20px;
      border-radius: 12px;
      max-width: 350px;
      width: 90%;
      text-align: center;
      border: 1px solid var(--border);
    }

    #waModal .wa-box h2 {
      margin: 0 0 12px 0;
      color: var(--accent2);
    }

    #waQrImg img {
      max-width: 260px;
      border-radius: 8px;
      margin: 10px 0;
    }
  </style>
</head>

<body>
  <header>
    <div class="header-left">
      <h1>🌸 Alma-chan</h1>
      <span>PC Control + Chat</span>
    </div>
    <div class="header-right">
      <button class="hdr-btn" id="micBtn" onclick="toggleMic()" title="Falar">🎤</button>
      <button class="hdr-btn active" id="ttsBtn" onclick="toggleTts()" title="Voz">🔊</button>
      <button class="hdr-btn" id="themeBtn" onclick="toggleTheme()" title="Tema">🌙</button>
      <button class="hdr-btn" onclick="openMenu()" title="Menu">☰</button>
    </div>
  </header>

  <div id="status-bar">
    <span><span class="dot dot-g" id="cpuDot"></span> CPU: <b id="s-cpu">-</b>%</span>
    <span><span class="dot dot-g" id="ramDot"></span> RAM: <b id="s-ram">-</b>%</span>
    <span>⏱ <b id="s-uptime">-</b>h</span>
    <span>👤 <b id="s-user">-</b></span>
  </div>

  <div id="shortcuts">
    <button onclick="quick('tocar lofi')">🎧 Lofi</button>
    <button onclick="quick('clima')">🌤️ Clima</button>
    <button onclick="quick('noticias')">📰 News</button>
    <button onclick="quick('tarefas')">📋 Tarefas</button>
    <button onclick="quick('sistema')">💻</button>
    <button onclick="quick('screenshot')">📸</button>
    <button onclick="quick('processos')">⚙️</button>
    <button onclick="quick('modo foco')">🎯 Foco</button>
    <button onclick="quick('organiza minhas janelas')">🪟 Janelas</button>
    <button onclick="quick('spotify play')">▶️</button>
    <button onclick="quick('spotify next')">⏭️</button>
    <button onclick="quick('spotify vol+')">🔊</button>
    <button onclick="quick('ler tela')">👁️</button>
    <button onclick="promptImage()">🎨</button>
    <button onclick="quick('cria uma musica alegre')">🎵</button>
    <button onclick="quick('clipboard')">📋</button>
    <button onclick="quick('conta uma piada')">😂</button>
    <button onclick="quick('bloquear')">🔒</button>
    <button onclick="quick('volume mute')">🔇</button>
  </div>

  <div id="chat"></div>

  <div class="preview-bar" id="previewBar">
    <img id="previewImg">
    <span id="previewName"></span>
    <button onclick="clearPreview()">✕</button>
  </div>

  <div id="input-bar">
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
    <button onclick="document.getElementById('fileInput').click()"
      style="background:var(--bg3);padding:9px 10px;">📎</button>
    <input type="text" id="msg" placeholder="Fale com Alma-chan..." autocomplete="off">
    <button onclick="send()">Enviar</button>
  </div>

  <div id="menu-modal">
    <div class="modal-content">
      <h3>🌸 Menu Alma-chan</h3>
      <button onclick="exportChat()">📥 Exportar conversa</button>
      <button onclick="clearChat()">🗑️ Limpar conversa</button>
      <button onclick="quick('modo foco')">🎯 Modo Foco</button>
      <button onclick="quick('organiza minhas janelas')">🪟 Organizar Janelas</button>
      <button onclick="quick('spotify play')">▶️ Play/Pause</button>
      <button onclick="quick('spotify next')">⏭️ Próxima música</button>
      <button onclick="quick('spotify vol+')">🔊 Volume +</button>
      <button onclick="quick('ler tela')">👁️ Ler Tela (OCR)</button>
      <button onclick="quick('alarme 5min beber agua')">⏰ Alarme 5min</button>
      <button onclick="quick('lembra que eu gosto de')">🧠 Memorar algo</button>
      <button onclick="quick('lembrar')">📝 O que lembro?</button>
      <button onclick="closeMenu()" class="modal-close">Fechar</button>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const msgInput = document.getElementById("msg");
    let recognition = null;
    let listening = false;
    let selectedFile = null;
    let selectedImageBase64 = null;
    const chatHistory = [];

    // --- Unique user ID per browser ---
    let userId = localStorage.getItem("alma-user-id");
    if (!userId) {
      userId = "web-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
      localStorage.setItem("alma-user-id", userId);
    }

    // --- THEME ---
    function toggleTheme() {
      document.body.classList.toggle("light");
      const btn = document.getElementById("themeBtn");
      btn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
      localStorage.setItem("alma-theme", document.body.classList.contains("light") ? "light" : "dark");
    }
    if (localStorage.getItem("alma-theme") === "light") toggleTheme();

    // --- MENU ---
    function openMenu() { document.getElementById("menu-modal").classList.add("show"); }
    function closeMenu() { document.getElementById("menu-modal").classList.remove("show"); }
    document.getElementById("menu-modal").addEventListener("click", (e) => {
      if (e.target === e.currentTarget) closeMenu();
    });

    // --- EXPORT ---
    function exportChat() {
      closeMenu();
      let txt = "=== Conversa com Alma-chan 🌸 ===\n\n";
      for (const m of chatHistory) {
        const who = m.role === "user" ? "👤 Pai" : "🌸 ALM-01P";
        txt += `${who}:\n${m.text}\n\n`;
      }
      const blob = new Blob([txt], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "alma-chan-conversa.txt";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function clearChat() {
      closeMenu();
      chatEl.innerHTML = "";
      chatHistory.length = 0;
      fetch("/api/clear", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ userId }) });
      addMsg("Memória limpa! ✨ Começamos de novo, Pai! 🌸", "alma");
    }

    // --- FILE UPLOAD ---
    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        selectedImageBase64 = e.target.result.split(",")[1];
        document.getElementById("previewImg").src = e.target.result;
        document.getElementById("previewName").textContent = file.name;
        document.getElementById("previewBar").classList.add("show");
      };
      reader.readAsDataURL(file);
      input.value = "";
    }
    function clearPreview() {
      selectedFile = null;
      selectedImageBase64 = null;
      document.getElementById("previewBar").classList.remove("show");
    }

    // --- STATUS ---
    async function updateStatus() {
      try {
        const r = await fetch("/api/status");
        const d = await r.json();
        document.getElementById("s-cpu").textContent = d.cpu;
        document.getElementById("s-ram").textContent = d.ramUsed;
        document.getElementById("s-uptime").textContent = d.uptime;
        document.getElementById("s-user").textContent = d.user;
        document.getElementById("cpuDot").className = "dot " + (d.cpu > 80 ? "dot-r" : d.cpu > 50 ? "dot-y" : "dot-g");
        document.getElementById("ramDot").className = "dot " + (d.ramUsed > 80 ? "dot-r" : d.ramUsed > 50 ? "dot-y" : "dot-g");
      } catch { }
    }
    updateStatus();
    setInterval(updateStatus, 5000);

    // --- TTS (Edge TTS Server) ---
    let ttsEnabled = true;
    let ttsAudio = null;

    function speak(text) {
      if (!ttsEnabled || !text) return;
      const clean = text.replace(/[🌸🥰✨⚙️📸💻📝🌐📶🔇❌🎉💕🔒📋💾📅🎲🪙😂🍅🧮🐍⚡🔋🔄🎵🔊📋🖼️🎚️⏻🔌💡🧹⌨️]/g, "").replace(/\n+/g, ". ").trim();
      if (!clean) return;

      fetch("/api/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: clean }),
      })
        .then(r => {
          if (!r.ok) throw new Error("TTS failed");
          return r.blob();
        })
        .then(blob => {
          if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
          const url = URL.createObjectURL(blob);
          ttsAudio = new Audio(url);
          ttsAudio.onended = () => { URL.revokeObjectURL(url); ttsAudio = null; };
          ttsAudio.play().catch(() => { });
        })
        .catch(() => { });
    }
    function toggleTts() {
      ttsEnabled = !ttsEnabled;
      const b = document.getElementById("ttsBtn");
      b.classList.toggle("active", ttsEnabled);
      b.textContent = ttsEnabled ? "🔊" : "🔇";
      if (!ttsEnabled && ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
    }

    // --- STT ---
    function toggleMic() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        addMsg("Speech recognition não suportado 😵", "alma"); return;
      }
      if (listening) { recognition.stop(); return; }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.lang = "pt-BR"; recognition.interimResults = false;
      const btn = document.getElementById("micBtn");
      btn.classList.add("mic-listening"); listening = true;
      recognition.onresult = (e) => { msgInput.value = e.results[0][0].transcript; send(); };
      recognition.onend = () => { btn.classList.remove("mic-listening"); listening = false; };
      recognition.onerror = () => { btn.classList.remove("mic-listening"); listening = false; };
      recognition.start();
    }

    // --- CHAT ---
    msgInput.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    function addMsg(text, who, opts = {}) {
      const div = document.createElement("div");
      div.className = `msg ${who}` + (opts.isAction ? " action" : "");
      if (opts.isAction) {
        const tag = document.createElement("span");
        tag.className = "action-tag"; tag.textContent = "⚙️ Ação";
        div.appendChild(tag);
      }
      if (opts.image) {
        const img = document.createElement("img");
        img.src = "data:image/png;base64," + opts.image;
        img.onclick = () => window.open(img.src, "_blank");
        div.appendChild(img);
      }
      if (text) {
        const span = document.createElement("span");
        span.textContent = text; div.appendChild(span);
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      chatHistory.push({ role: who === "user" ? "user" : "assistant", text: text || "" });

      if (who === "alma" && text) {
        const combatWords = ["alvo detectado", "laser", "plasma", "ameaça eliminada", "destruição", "atacar", "misseis", "canhão", "radar", "mod combate"];
        const isCombat = combatWords.some(w => text.toLowerCase().includes(w));
        if (isCombat) {
          document.body.classList.add("combat");
        } else if (document.body.classList.contains("combat") && !text.toLowerCase().includes("combate")) {
          setTimeout(() => document.body.classList.remove("combat"), 3000);
        }
      }
    }

    function showTyping() {
      const d = document.createElement("div");
      d.className = "typing"; d.id = "typing";
      d.textContent = "Alma-chan processando...";
      chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
    }
    function removeTyping() { document.getElementById("typing")?.remove(); }

    function quick(t) { msgInput.value = t; send(); }

    async function send() {
      const text = msgInput.value.trim();
      if (!text && !selectedFile) return;
      let msg = text || "O que tem nessa imagem?";
      const imgB64 = selectedImageBase64;
      const hasImage = !!imgB64;

      addMsg(hasImage ? "📷 [imagem]" : msg, "user");
      if (hasImage) {
        const userDiv = chatEl.lastElementChild;
        const img = document.createElement("img");
        img.src = "data:image/jpeg;base64," + imgB64;
        img.style.maxWidth = "200px";
        img.style.borderRadius = "8px";
        img.style.marginTop = "6px";
        userDiv.appendChild(img);
      }
      msgInput.value = ""; clearPreview();
      showTyping();
      try {
        const body = { message: msg, userId };
        if (imgB64) body.image = imgB64;
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        removeTyping();
        if (data.image) {
          addMsg(data.reply || "📸 Screenshot:", "alma", { isAction: true, image: data.image });
          speak("Pronto, screenshot tirado!");
        } else if (data.musicPath) {
          addMsg(data.reply, "alma", { isAction: true });
          speak("Música gerada! Confira o arquivo MIDI!");
        } else if (data.action) {
          addMsg(data.reply, "alma", { isAction: true });
          speak(data.reply);
        } else {
          addMsg(data.reply || data.error, "alma");
          speak(data.reply);
        }
      } catch {
        removeTyping();
        addMsg("Alma-chan travou... 😵", "alma");
      }
    }
